# PDF OCR RAG Pipeline – Serverless GPU Compute (SGC) variant
# Task 1: OCR + adapter (Serverless GPU). Task 2: Chunk + index (Serverless). Task 3: RAG chain (Serverless).
# Uses serverless compute throughout — no cluster configuration needed.

resources:
  jobs:
    pdf_ocr_rag_pipeline_sgc:
      name: "[${bundle.target}] PDF OCR RAG Pipeline (Serverless GPU)"
      description: "End-to-end pipeline using Serverless GPU Compute: OCR (PDF/images), chunk + Vector Search index, RAG chain with MLflow model logging."

      permissions:
        - level: CAN_VIEW
          group_name: users

      tasks:
        - task_key: ocr_and_adapter
          description: "OCR on PDFs/images using Serverless GPU (@ray_launch), adapter to parsed-docs table"
          notebook_task:
            notebook_path: ../notebooks/01b-ocr-serverless.py
            base_parameters:
              input_mode: ${var.input_mode}
              pdf_dir: ${var.pdf_dir}
              image_dir: ${var.image_dir}
              save_images: ${var.save_images}
              ocr_model: ${var.ocr_model}
              num_gpus: ${var.sgc_num_gpus}
              uc_catalog: ${var.catalog}
              uc_schema: ${var.schema}
              uc_volume: ${var.uc_volume}
              uc_table: ${var.uc_table}
              parsed_table: ${var.parsed_table_suffix}
          # Serverless GPU compute — notebook runs on single A10,
          # @ray_launch provisions additional remote GPUs
          compute:
            hardware_accelerator: A10G

        - task_key: chunk_index
          description: "Chunk parsed-docs, write chunked Delta table, create/update Vector Search index"
          depends_on:
            - task_key: ocr_and_adapter
          notebook_task:
            notebook_path: ../notebooks/02-chunk-index.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              parsed_table_suffix: ${var.parsed_table_suffix}
              vector_search_endpoint: ${var.vector_search_endpoint}
              embedding_endpoint: ${var.embedding_endpoint}
          environment_key: default

        - task_key: rag_chain
          description: "Build RAG chain, test retrieval + generation, log model to MLflow"
          depends_on:
            - task_key: chunk_index
          notebook_task:
            notebook_path: ../notebooks/03-rag-chain.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              vector_search_endpoint: ${var.vector_search_endpoint}
              llm_endpoint: ${var.llm_endpoint}
          environment_key: default

      environments:
        - environment_key: default
